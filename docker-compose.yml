version: "3"

services:

  # ── PostgreSQL — Nakama's persistent store ──────────────────────────────
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nakama
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Nakama game server ──────────────────────────────────────────────────
  nakama:
    image: heroiclabs/nakama:3.22.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
          --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
          --name nakama1
          --database.address postgres:localdb@postgres:5432/nakama
          --logger.level DEBUG
          --session.token_expiry_sec 7200
          --runtime.lua_max_count 128
    volumes:
      - ./modules:/nakama/data/modules   # <-- mounts your Lua files
    ports:
      - "7349:7349"   # gRPC API
      - "7350:7350"   # HTTP API  (client SDK connects here)
      - "7351:7351"   # Console  (browser: http://localhost:7351)

volumes:
  pgdata:
